name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Opt in to Node 24 for any JS-based actions. Node 20 is deprecated
  # and will be forced off by GitHub in June 2026; this flips the
  # switch early so we're running on the same Node they'll default to.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Runs everywhere, including fork PRs — no SDK needed.
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all --check

  # build / clippy / test need the closed-source Noesis SDK, which only lives on
  # our self-hosted runner. Never run untrusted fork-PR code there: skip any PR
  # whose head is a fork. Same-repo branch PRs and pushes to main/tags are fine.
  build-test:
    name: build • clippy • test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, noesis-sdk]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Keep target/ between runs for fast incremental builds.
          clean: false

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features
