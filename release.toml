# cargo-release configuration.
#
# `cargo release <level|version>` bumps the version in Cargo.toml, stamps the
# CHANGELOG, commits, tags `vX.Y.Z`, and pushes. Publishing to crates.io is NOT
# done from this machine — the pushed tag triggers .github/workflows/release.yml,
# which publishes via crates.io Trusted Publishing. Hence `publish = false` here.
#
# The release gate is a local `cargo test` against the Noesis SDK before you run
# this; CI cannot build the crate (the SDK is closed-source and absent there).

publish = false
tag = true
tag-name = "v{{version}}"
push = true
allow-branch = ["main"]

pre-release-replacements = [
  { file = "CHANGELOG.md", search = "## \\[Unreleased\\]", replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}", exactly = 1 },
  { file = "CHANGELOG.md", search = "v0\\.9\\.0\\.\\.\\.HEAD", replace = "v{{version}}...HEAD", exactly = 1, min = 0 },
]
